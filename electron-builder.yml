appId: com.niharturumella.bytemap
productName: Bytemap
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!build-assets'
  # Rust source/build state is excluded; the release sidecar is copied into Contents/MacOS.
  - '!native/**'
  - '!helper/**'
asarUnpack:
  - resources/**
  - proto/**
  - out/agent-backend/**
  - node_modules/@oh-my-pi/pi-natives-darwin-arm64/**
win:
  executableName: Bytemap
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  icon: build/icon.icns
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Bytemap needs access to your Documents folder to measure space there.
    - NSDownloadsFolderUsageDescription: Bytemap needs access to your Downloads folder to find old downloads.
  notarize: false
  extraFiles:
    - from: helper/.build/release/BytemapHelper
      to: MacOS/BytemapHelper
    - from: helper/.build/release/BytemapHelperCtl
      to: MacOS/BytemapHelperCtl
    - from: resources/bin/bun
      to: MacOS/bun
    - from: native/target/release/bytemap-scanner
      to: MacOS/bytemap-scanner
    - from: helper/Resources/com.niharturumella.bytemap.helper.plist
      to: Library/LaunchDaemons/com.niharturumella.bytemap.helper.plist
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  icon: build/icon.png
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
