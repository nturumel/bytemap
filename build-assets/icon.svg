<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#232322"/>
      <stop offset="1" stop-color="#151514"/>
    </linearGradient>
  </defs>

  <!-- macOS applies its own corner-radius mask, so this ships as a full square -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>

  <!-- Treemap motif, mirroring the app's own disk-usage view -->
  <g>
    <!-- large folder block -->
    <rect x="120" y="120" width="430" height="530" rx="28" fill="#2a78d6"/>
    <!-- file block -->
    <rect x="566" y="120" width="338" height="330" rx="28" fill="#1baf7a"/>
    <!-- cache block -->
    <rect x="120" y="666" width="430" height="238" rx="28" fill="#eda100"/>
    <!-- app-bundle block -->
    <rect x="566" y="466" width="164" height="438" rx="28" fill="#4a3aa7"/>
    <!-- small accent block -->
    <rect x="746" y="466" width="158" height="438" rx="28" fill="#3987e5"/>
  </g>
</svg>
